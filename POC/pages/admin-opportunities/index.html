<div class="page-container admin-opportunities-page">
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title">Opportunity Moderation</h1>
            <p class="page-subtitle">Review and moderate platform opportunities</p>
        </div>
    </div>
    <div class="page-body">
    
    <div class="filters-section">
        <div class="filters">
            <select id="filter-status" class="form-select">
                <option value="">All Status</option>
                <option value="draft">Draft</option>
                <option value="published">Published</option>
                <option value="in_negotiation">In Negotiation</option>
                <option value="contracted">Contracted</option>
                <option value="in_execution">In Execution</option>
                <option value="completed">Completed</option>
                <option value="closed">Closed</option>
                <option value="cancelled">Cancelled</option>
            </select>
            
            <select id="filter-type" class="form-select">
                <option value="">All types (Need / Offer)</option>
                <option value="request">Need</option>
                <option value="offer">Offer</option>
                <option value="hybrid">Hybrid</option>
            </select>
            
            <select id="filter-model" class="form-select">
                <option value="">All Models</option>
                <option value="project_based">Project-Based</option>
                <option value="strategic_partnership">Strategic Partnership</option>
                <option value="resource_pooling">Resource Pooling</option>
                <option value="hiring">Hiring</option>
                <option value="competition">Competition</option>
            </select>
            
            <input 
                type="text" 
                id="filter-search" 
                class="form-input" 
                placeholder="Search opportunities..."
            >
            
            <button id="apply-filters" class="btn btn-secondary">Apply Filters</button>
        </div>
    </div>
    
    <div id="admin-opp-bulk-actions" class="mb-3" style="display: none;">
        <label>Bulk action:</label>
        <select id="admin-opp-bulk-status" class="form-select inline-block mx-2">
            <option value="">Set status to...</option>
            <option value="closed">Closed</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <button type="button" id="admin-opp-bulk-apply" class="btn btn-secondary btn-sm">Apply</button>
    </div>
    
    <div id="opportunities-list" class="opportunities-list">
        <div class="spinner"></div>
    </div>
    </div>
</div>

<style>
.admin-opportunities-page {
    /* Page specific styles */
}

.opportunities-list {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
}
</style>

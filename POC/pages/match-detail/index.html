<div class="page-container match-detail-page">
    <div id="match-detail-loading" class="spinner"></div>
    <div id="match-detail-content" class="page-body match-detail-content" style="display: none;">
        <!-- Header -->
        <div class="match-detail-header bg-white border border-gray-200 rounded-lg p-6 mb-6" id="match-detail-header">
            <h1 class="page-title text-2xl font-bold text-gray-900 mb-2" id="match-detail-title">Match Details</h1>
            <div class="flex flex-wrap gap-3 items-center text-sm">
                <span class="text-gray-600">Type: <strong id="match-detail-type"></strong></span>
                <span class="text-gray-600">Score: <strong id="match-detail-score" class="text-primary"></strong></span>
                <span class="text-gray-600">Status: <span id="match-detail-status" class="badge"></span></span>
            </div>
        </div>

        <div class="match-detail-grid grid gap-6">
            <div class="match-detail-main space-y-6">
                <!-- Exchange Flow -->
                <div class="bg-white border border-gray-200 rounded-lg p-6" id="match-detail-exchange-flow">
                    <h2 class="text-lg font-semibold text-gray-900 mb-3">Exchange Flow</h2>
                    <div id="match-detail-exchange-flow-body" class="match-exchange-diagram"></div>
                </div>

                <!-- Value Exchange -->
                <div class="bg-white border border-gray-200 rounded-lg p-6" id="match-detail-value">
                    <h2 class="text-lg font-semibold text-gray-900 mb-3">Value Exchange</h2>
                    <div id="match-detail-value-body" class="text-gray-700"></div>
                </div>

                <!-- Match Score & Criteria -->
                <div class="bg-white border border-gray-200 rounded-lg p-6" id="match-detail-score-section">
                    <h2 class="text-lg font-semibold text-gray-900 mb-3">Match Score</h2>
                    <div class="mb-3">
                        <span id="match-detail-score-badge" class="badge badge-success text-base"></span>
                    </div>
                    <h3 class="text-sm font-medium text-gray-700 mb-2">Criteria</h3>
                    <div id="match-detail-breakdown-body" class="text-sm"></div>
                </div>
            </div>
            <div class="space-y-6">
                <!-- Participants -->
                <div class="bg-white border border-gray-200 rounded-lg p-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-3">Participants</h2>
                    <ul class="space-y-4" id="match-detail-participants"></ul>
                </div>

                <!-- Actions -->
                <div class="bg-white border border-gray-200 rounded-lg p-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-3">Actions</h2>
                    <div class="flex flex-col gap-2" id="match-detail-actions">
                        <button type="button" class="btn btn-primary w-full" id="btn-accept-match">Accept Match</button>
                        <a href="#" id="link-start-negotiation" class="btn btn-outline w-full text-center no-underline">Start Negotiation</a>
                        <a href="#" id="link-message-participants" class="btn btn-outline w-full text-center no-underline">Message Participants</a>
                        <button type="button" class="btn btn-outline w-full text-gray-600" id="btn-decline-match">Decline</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="match-detail-not-found" class="page-body" style="display: none;">
        <p class="text-gray-600">Match not found or you do not have access.</p>
        <a href="#" data-route="/matches" class="text-primary font-medium mt-2 inline-block">Back to Matches</a>
    </div>
</div>

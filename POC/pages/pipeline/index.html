<div class="page-container pipeline-page">
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title">Pipeline Management</h1>
            <p class="page-subtitle">Track your opportunities and applications</p>
        </div>
    </div>
    <div class="page-body">
    
    <div class="pipeline-tabs">
        <button class="tab-btn active" data-tab="opportunities">My Opportunities</button>
        <button class="tab-btn" data-tab="applications">My Applications</button>
        <button class="tab-btn" data-tab="matches">Matches</button>
    </div>
    
    <div class="pipeline-content">
        <!-- Opportunities Pipeline -->
        <div id="tab-opportunities" class="tab-content active">
            <div class="pipeline-opportunities-filters">
                <label class="text-sm font-medium text-gray-700 mr-2">Intent:</label>
                <select id="filter-opportunities-intent" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">All (Need &amp; Offer)</option>
                    <option value="request">NEED</option>
                    <option value="offer">OFFER</option>
                </select>
            </div>
            <div class="kanban-board">
                <div class="kanban-column" data-column-title="Draft">
                    <h3 class="kanban-column-header">Draft <span class="column-count">(0)</span></h3>
                    <div id="kanban-draft" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Published">
                    <h3 class="kanban-column-header">Published <span class="column-count">(0)</span></h3>
                    <div id="kanban-published" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="In Progress">
                    <h3 class="kanban-column-header">In Progress <span class="column-count">(0)</span></h3>
                    <div id="kanban-in-progress" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Closed">
                    <h3 class="kanban-column-header">Closed <span class="column-count">(0)</span></h3>
                    <div id="kanban-closed" class="kanban-items"></div>
                </div>
            </div>
        </div>
        
        <!-- Applications Pipeline -->
        <div id="tab-applications" class="tab-content" style="display: none;">
            <div class="pipeline-applications-filters">
                <label class="text-sm font-medium text-gray-700 mr-2">Intent:</label>
                <select id="filter-applications-intent" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">All (Need &amp; Offer)</option>
                    <option value="request">NEED</option>
                    <option value="offer">OFFER</option>
                </select>
            </div>
            <div class="kanban-board">
                <div class="kanban-column" data-column-title="Pending">
                    <h3 class="kanban-column-header">Pending <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-pending" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Reviewing">
                    <h3 class="kanban-column-header">Reviewing <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-reviewing" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Shortlisted">
                    <h3 class="kanban-column-header">Shortlisted <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-shortlisted" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="In negotiation">
                    <h3 class="kanban-column-header">In negotiation <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-in-negotiation" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Accepted">
                    <h3 class="kanban-column-header">Accepted <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-accepted" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Rejected / Withdrawn">
                    <h3 class="kanban-column-header">Rejected / Withdrawn <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-rejected" class="kanban-items"></div>
                </div>
            </div>
        </div>
        
        <!-- Matches Pipeline -->
        <div id="tab-matches" class="tab-content" style="display: none;">
            <div class="matches-subtabs" id="matches-subtabs">
                <button type="button" class="matches-subtab active" data-subtab="recommended" id="matches-subtab-recommended">Recommended Matches</button>
                <button type="button" class="matches-subtab" data-subtab="opportunity" id="matches-subtab-opportunity">Opportunity Matches</button>
            </div>
            <div id="matches-recommended" class="matches-panel active">
                <div id="matches-recommended-list" class="matches-container">
                    <div class="spinner"></div>
                </div>
            </div>
            <div id="matches-opportunity" class="matches-panel">
                <div id="matches-opportunity-list" class="matches-container">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>

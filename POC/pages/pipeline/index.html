<div class="page-container pipeline-page">
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title">Pipeline Management</h1>
            <p class="page-subtitle">Track your opportunities and applications</p>
        </div>
    </div>
    <div class="page-body pipeline-page-body">
    <div class="pipeline-tabs">
        <button class="tab-btn active" data-tab="opportunities">My Opportunities</button>
        <button class="tab-btn" data-tab="applications">My Applications</button>
        <button class="tab-btn" data-tab="matches">Matches</button>
    </div>
    
    <div class="pipeline-content">
        <!-- Opportunities Pipeline -->
        <div id="tab-opportunities" class="tab-content active">
            <div class="pipeline-opportunities-filters">
                <label class="text-sm font-medium text-gray-700 mr-2">Intent:</label>
                <select id="filter-opportunities-intent" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">All (Need &amp; Offer)</option>
                    <option value="request">NEED</option>
                    <option value="offer">OFFER</option>
                </select>
            </div>
            <div class="kanban-board">
                <div class="kanban-column" data-column-title="Draft">
                    <h3 class="kanban-column-header">Draft <span class="column-count">(0)</span></h3>
                    <div id="kanban-draft" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Published">
                    <h3 class="kanban-column-header">Published <span class="column-count">(0)</span></h3>
                    <div id="kanban-published" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="In Progress">
                    <h3 class="kanban-column-header">In Progress <span class="column-count">(0)</span></h3>
                    <div id="kanban-in-progress" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Closed">
                    <h3 class="kanban-column-header">Closed <span class="column-count">(0)</span></h3>
                    <div id="kanban-closed" class="kanban-items"></div>
                </div>
            </div>
        </div>
        
        <!-- Applications Pipeline -->
        <div id="tab-applications" class="tab-content" style="display: none;">
            <div class="pipeline-applications-filters">
                <label class="text-sm font-medium text-gray-700 mr-2">Intent:</label>
                <select id="filter-applications-intent" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">All (Need &amp; Offer)</option>
                    <option value="request">NEED</option>
                    <option value="offer">OFFER</option>
                </select>
            </div>
            <div class="kanban-board">
                <div class="kanban-column" data-column-title="Pending">
                    <h3 class="kanban-column-header">Pending <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-pending" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Reviewing">
                    <h3 class="kanban-column-header">Reviewing <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-reviewing" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Shortlisted">
                    <h3 class="kanban-column-header">Shortlisted <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-shortlisted" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="In negotiation">
                    <h3 class="kanban-column-header">In negotiation <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-in-negotiation" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Accepted">
                    <h3 class="kanban-column-header">Accepted <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-accepted" class="kanban-items"></div>
                </div>
                <div class="kanban-column" data-column-title="Rejected / Withdrawn">
                    <h3 class="kanban-column-header">Rejected / Withdrawn <span class="column-count">(0)</span></h3>
                    <div id="kanban-app-rejected" class="kanban-items"></div>
                </div>
            </div>
        </div>
        
        <!-- Matches Pipeline -->
        <div id="tab-matches" class="tab-content" style="display: none;">
            <div class="matches-subtabs" id="matches-subtabs" role="tablist">
                <button type="button" class="matches-subtab active" role="tab" data-subtab="recommended" id="matches-subtab-recommended" aria-selected="true">Recommended</button>
                <button type="button" class="matches-subtab" role="tab" data-subtab="opportunity" id="matches-subtab-opportunity" aria-selected="false">Opportunity Matches</button>
                <button type="button" class="matches-subtab" role="tab" data-subtab="consortium" id="matches-subtab-consortium" aria-selected="false">Consortium Invitations</button>
            </div>
            <div id="matches-recommended" class="matches-panel active" role="tabpanel">
                <div id="matches-recommended-list" class="matches-container">
                    <div class="spinner"></div>
                </div>
            </div>
            <div id="matches-opportunity" class="matches-panel" role="tabpanel">
                <div id="matches-opportunity-list" class="matches-container">
                    <div class="spinner"></div>
                </div>
            </div>
            <div id="matches-consortium" class="matches-panel" role="tabpanel">
                <div id="matches-consortium-list" class="matches-container">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
    </div>
</div>

<style>
.pipeline-page {
    /* Page specific styles */
}

/* Centered content area - max width 1200px */
.pipeline-page-body {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
}
.pipeline-content {
    margin-top: var(--spacing-lg);
}

.pipeline-applications-filters,
.pipeline-opportunities-filters {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    margin-bottom: var(--spacing-xl);
}

.pipeline-tabs {
    display: flex;
    gap: var(--spacing-sm);
    margin-bottom: var(--spacing-xl);
    border-bottom: 2px solid var(--border-color);
}

.tab-btn {
    padding: var(--spacing-md) var(--spacing-lg);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    font-size: var(--font-size-base);
    font-weight: 600;
    color: var(--text-secondary);
    transition: color 0.2s, border-color 0.2s;
}

.tab-btn:hover {
    color: var(--primary-color);
}

.tab-btn.active {
    color: var(--primary-color);
    border-bottom-color: var(--primary-color);
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

.kanban-board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: var(--spacing-xl);
    margin-top: var(--spacing-xl);
}

.kanban-column {
    background: var(--bg-tertiary);
    border-radius: var(--radius-lg);
    padding: var(--spacing-lg);
    min-height: 400px;
}

.kanban-column h3 {
    font-size: var(--font-size-lg);
    margin-bottom: var(--spacing-md);
    padding-bottom: var(--spacing-md);
    border-bottom: 2px solid var(--border-color);
    text-align: center;
}

.kanban-column-drag-over {
    outline: 2px dashed var(--primary-color);
    outline-offset: 2px;
}

.kanban-items {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
}

.kanban-item {
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: var(--spacing-md);
    cursor: move;
    transition: transform 0.2s, box-shadow 0.2s;
}

.kanban-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.kanban-item-title {
    font-weight: 600;
    margin-bottom: var(--spacing-xs);
    font-size: var(--font-size-sm);
}

.kanban-item-meta {
    font-size: var(--font-size-xs);
    color: var(--text-muted);
}

.kanban-item-actions {
    margin-top: var(--spacing-sm);
    display: flex;
    gap: var(--spacing-xs);
    flex-wrap: wrap;
}

/* Matches sub-tabs - clearer hierarchy */
.matches-subtabs {
    display: flex;
    gap: var(--spacing-xs);
    margin-bottom: var(--spacing-xl);
    border-bottom: 2px solid var(--border-color);
}

.matches-subtab {
    padding: var(--spacing-md) var(--spacing-lg);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    font-size: var(--font-size-sm);
    font-weight: 600;
    color: var(--text-secondary);
    transition: color 0.2s, border-color 0.2s, background 0.2s;
}

.matches-subtab:hover {
    color: var(--primary-color);
}

.matches-subtab.active {
    color: var(--primary-color);
    border-bottom-color: var(--primary-color);
}

.matches-panel {
    display: none;
}

.matches-panel.active {
    display: block;
}

/* Outer container should not be grid; inner card wrapper owns layout */
.matches-container {
    display: block;
    width: 100%;
}

/* Card grid: responsive [Card][Card][Card] / [Card][Card] / [Card] */
.match-cards-grid {
    display: grid;
    gap: 20px;
    align-items: stretch;
    grid-template-columns: 1fr;
}

/* Medium: 2 columns */
@media (min-width: 481px) {
    .match-cards-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Large: 3 columns */
@media (min-width: 1025px) {
    .match-cards-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

/* Vertical cards (e.g. recommended/consortium) – horizontal cards use their own flex */
.match-cards-grid .card:not(.match-card-horizontal) {
    display: flex;
    flex-direction: column;
    min-height: 0;
    min-width: 0;
}

.match-cards-grid .card:not(.match-card-horizontal) .card-body {
    flex: 1;
    min-height: 0;
    overflow: hidden;
}

.match-cards-grid .card:not(.match-card-horizontal) .card-body .match-card-title {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.match-cards-grid .card:not(.match-card-horizontal) .card-body p.text-gray-900:not(.match-card-title) {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.match-cards-grid .card:not(.match-card-horizontal) .card-footer {
    flex-shrink: 0;
}

.matches-section {
    margin-bottom: var(--spacing-2xl);
    width: 100%;
}
.matches-section:last-child {
    margin-bottom: 0;
}
.matches-section-title {
    font-size: var(--font-size-lg);
    font-weight: 600;
    color: var(--text-primary);
    margin: 0 0 var(--spacing-lg) 0;
}
</style>

<div class="card border border-gray-200 rounded-lg overflow-hidden match-card match-card-circular" data-match-id="{{id}}" data-match-type="circular">
    <div class="card-header bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <h3 class="text-lg font-semibold text-gray-900">Circular Exchange Opportunity Found</h3>
        <span class="badge badge-match {{matchBadgeClass}}">{{matchScorePercent}}% MATCH</span>
    </div>
    <div class="card-body p-4 space-y-3">
        <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Exchange chain</p>
            <p class="text-gray-900 font-medium mt-1">{{cycleLabel}}</p>
        </div>
        <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Your Offer</p>
            <p class="text-gray-900">{{youGiveTitle}}</p>
        </div>
        <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">You Receive</p>
            <p class="text-gray-900">{{youReceiveTitle}}</p>
        </div>
    </div>
    <div class="card-footer bg-gray-50 px-4 py-3 flex flex-wrap gap-2">
        <a href="#" data-route="/matches/{{id}}" class="btn btn-primary btn-sm">Join exchange chain</a>
        <a href="#" data-route="/matches/{{id}}" class="btn btn-outline btn-sm">Review participants</a>
        <button type="button" class="btn btn-outline btn-sm text-gray-600 btn-decline-match" data-match-id="{{id}}">Decline</button>
    </div>
</div>

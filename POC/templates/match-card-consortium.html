<div class="card match-card match-card-consortium match-card-vertical" data-match-id="{{id}}" data-match-type="consortium">
    <div class="match-card-vertical-header">
        <h3 class="match-card-vertical-title">Consortium: {{projectTitle}}</h3>
        <span class="badge badge-match {{matchBadgeClass}}">{{matchScorePercent}}% MATCH</span>
    </div>
    <div class="match-card-vertical-body">
        <div class="match-card-vertical-section">
            <p class="match-card-vertical-label">Potential Partners</p>
            <ul class="match-card-vertical-partners">
                {{#each roles}}
                <li><span class="match-card-vertical-partner-role">{{role}}</span> {{partnerName}}</li>
                {{/each}}
            </ul>
        </div>
    </div>
    <div class="match-card-vertical-footer">
        <a href="#" data-route="/matches/{{id}}" class="btn btn-primary btn-sm">Create consortium</a>
        <a href="#" data-route="/matches/{{id}}" class="match-card-vertical-link">View details</a>
    </div>
</div>

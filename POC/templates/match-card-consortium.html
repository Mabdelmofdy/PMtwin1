<div class="card border border-gray-200 rounded-lg overflow-hidden match-card match-card-consortium" data-match-id="{{id}}" data-match-type="consortium">
    <div class="card-header bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <h3 class="text-lg font-semibold text-gray-900">Consortium Opportunity Found</h3>
        <span class="badge badge-success">{{matchScorePercent}}% Match</span>
    </div>
    <div class="card-body p-4 space-y-3">
        <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide">Project</p>
            <p class="text-gray-900 font-medium">{{projectTitle}}</p>
        </div>
        <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Potential Partners</p>
            <ul class="space-y-1">
                {{#each roles}}
                <li class="text-sm text-gray-700"><span class="font-medium">{{role}}</span> → {{partnerName}}</li>
                {{/each}}
            </ul>
        </div>
    </div>
    <div class="card-footer bg-gray-50 px-4 py-3 flex flex-wrap gap-2">
        <a href="#" data-route="/matches/{{id}}" class="btn btn-primary btn-sm">Create consortium</a>
        <a href="#" data-route="/matches/{{id}}" class="btn btn-outline btn-sm">Invite partners</a>
        <a href="#" data-route="/matches/{{id}}" class="btn btn-outline btn-sm">View profiles</a>
    </div>
</div>

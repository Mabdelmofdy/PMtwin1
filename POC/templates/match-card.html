<div class="card match-card-legacy match-card-vertical">
    <div class="match-card-vertical-header">
        <h3 class="match-card-vertical-title">{{cardTitle}}</h3>
        <span class="badge badge-match {{matchBadgeClass}}">{{matchScorePercent}}% MATCH</span>
    </div>
    <div class="match-card-vertical-body">
        <div class="match-card-vertical-section">
            <p class="match-card-vertical-label">{{section1Label}}</p>
            <p class="match-card-vertical-content">{{section1Content}}</p>
        </div>
        <div class="match-card-vertical-section">
            <p class="match-card-vertical-label">{{section2Label}}</p>
            <p class="match-card-vertical-content">{{section2Content}}</p>
            <p class="match-card-vertical-meta">Model: {{opportunity.modelType}} | Status: {{opportunity.status}}</p>
        </div>
    </div>
    <div class="match-card-vertical-footer">
        <a href="#" data-route="{{primaryActionRoute}}" class="btn btn-primary btn-sm">{{primaryActionLabel}}</a>
        <a href="#" data-route="{{secondaryActionRoute}}" class="match-card-vertical-link">{{secondaryActionLabel}}</a>
        <a href="#" data-route="{{tertiaryActionRoute}}" class="match-card-vertical-link">{{tertiaryActionLabel}}</a>
    </div>
</div>
